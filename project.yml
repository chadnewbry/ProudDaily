name: Proud Daily
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: true

targets:
  Proud Daily:
    type: application
    platform: iOS
    sources:
      - path: Proud Daily
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.prouddaily
        INFOPLIST_KEY_CFBundleDisplayName: "Proud Daily"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Proud Daily uses HealthKit to track your mindfulness minutes."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Proud Daily uses the microphone for voice journaling."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Proud Daily accesses your photo library to personalize your journal."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: Proud Daily/Proud Daily.entitlements

  ProudDailyWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.prouddaily.widget
        INFOPLIST_KEY_CFBundleDisplayName: "Proud Daily Widget"
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: "com.apple.widgetkit-extension"
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - target: Proud Daily
        embed: false
